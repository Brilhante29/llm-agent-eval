id: 9
name: llm-agent-eval
program:
  id: ai-evaluation-retrieval
  narrative_fit: Evaluates execution evidence produced by agents in the AI Evaluation and RAG Platform.
  shared_assets:
    - execution trace contract
    - strict local evaluator
    - portfolio-compatible benchmark result
status: benchmarked
claim: Offline harness that scores supplied agent traces against expected outcomes and tool calls while aggregating observed latency and cost.
stack:
  - python
  - jsonl
  - unittest
  - docker
language_profile:
  primary: python
  secondary: []
  reason: Trace validation and deterministic evaluation are packaged as testable Python use cases with a CLI.
decision_brain:
  agent_graph:
    mode: principal-agent-orchestrated
    source: .portfolio/decision-brain/agent-graph.yaml
    handoff: sdd/agent-handoff.md
    local_first_runtime: docker
  reuse_improvement_loop:
    source: .portfolio/decision-brain/reuse-improvement-loop.yaml
    review_path: sdd/reuse-improvement-review.md
    current_status: backlog_recorded
  principles:
    coupling_rule: Evaluation accepts provider-neutral task and trace records and never imports an agent runtime.
    solid: [srp, ocp, lsp, isp, dip]
    simplicity_rule: Score supplied evidence; do not embed a fake router or provider.
    testability_rule: Tests use temporary JSONL records and require no network or credentials.
  stack_profile: python
  api_style: cli-first
  messaging: none
  cloud:
    mode: none
    local_provider: kumo
    real_provider_target: none
    adapter_rule: Agent runtimes export the trace contract instead of entering the scoring core.
  database: fixture-files
  runtime: python-cli
  library_policy: Use the standard library for the local benchmark; provider SDKs belong in external trace producers.
  record_path: sdd/technical-decision.md
architecture:
  style: functional-core-imperative-shell
  reason: Validation and scoring are pure policies around file-based input/output adapters.
  dependency_rule: The evaluator never executes an agent or imports provider, cloud, transport, or billing SDKs.
design_system:
  tokens: .portfolio/design-system/tokens.yaml
  readme_components: [readme_header, benchmark_card, architecture_card, references_table]
  diagram_required: true
reuse:
  kit_version: local
  uses: [catalog, programs, decision-brain, reuse-improvement-loop, architecture, language-profiles, design-system, sdd, harness, templates, skills]
benchmark:
  primary_metric: task_success_rate
  unit: ratio
  command: python -m llm_agent_eval benchmark --tasks data/fixtures/tasks.jsonl --traces data/fixtures/traces.jsonl --output benchmarks/results/agent-eval-baseline.json
  result_path: benchmarks/results/agent-eval-baseline.json
release:
  docker: Dockerfile
  no_secret_default_path: true
  readme_has_number: true
  references_documented: true
